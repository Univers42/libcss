<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>LibCSS - Prismatica Test</title>
    <link rel="stylesheet" href="dist/css/libcss.css">
    
    <style>
        /* Estilos extra para que el test sea legible */
        body {
            padding: 40px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .section {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid var(--prisma-border);
            border-radius: 12px;
            background-color: var(--prisma-bg-secondary);
        }
        h1 { margin-bottom: 24px; }
        h2 { margin-bottom: 16px; color: var(--prisma-accent); }
        .flex { display: flex; gap: 12px; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="prisma-heading prisma-heading--1">Prismatica Design System</h1>
        
        <div class="section">
            <h2 class="prisma-heading prisma-heading--3">Buttons</h2>
            <div class="flex">
                <button class="prisma-btn prisma-btn--primary">Primary Button</button>
                <button class="prisma-btn prisma-btn--secondary">Secondary</button>
                <button class="prisma-btn prisma-btn--outline">Outline</button>
                <button class="prisma-btn prisma-btn--danger">Danger</button>
            </div>
        </div>

        <div class="section">
            <h2 class="prisma-heading prisma-heading--3">Status & Badges</h2>
            <div class="flex">
                <span class="badge badge--success">Success</span>
                <span class="badge badge--warning">Warning</span>
                <span class="badge badge--danger">Error</span>
                <div class="chip chip--filled chip--primary">Primary Chip</div>
            </div>
        </div>

        <div class="section">
            <h2 class="prisma-heading prisma-heading--3">Security</h2>
            <div class="prisma-strength-bar">
                <div class="prisma-strength-bar__indicators">
                    <div class="prisma-strength-bar__item prisma-strength-bar__item--active-3"></div>
                    <div class="prisma-strength-bar__item prisma-strength-bar__item--active-3"></div>
                    <div class="prisma-strength-bar__item prisma-strength-bar__item--active-3"></div>
                </div>
                <span class="prisma-strength-bar__label prisma-strength-bar__label--3">Strong Password</span>
            </div>
        </div>
    </div>
</body>
</html>
